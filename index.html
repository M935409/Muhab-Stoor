<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>سوقنا - التطوير الشامل</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #2563eb;
            --soft-blue: #eff6ff;
            --deep-blue: #1e3a8a;
        }
        body { 
            font-family: 'Cairo', sans-serif; 
            background: linear-gradient(135deg, #f8fafc 0%, #e0f2fe 100%);
            background-attachment: fixed;
            min-height: 100vh;
            color: #1e293b;
            padding-bottom: 80px;
        }
        .glass-nav {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
        .logo-text {
            background: linear-gradient(to left, #1e40af, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;
        }
        .bottom-nav {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            height: 70px;
            background: white;
            display: flex;
            justify-content: space-around;
            align-items: center;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.05);
            z-index: 100;
            border-radius: 25px 25px 0 0;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 10px;
            font-weight: bold;
            color: #94a3b8;
            transition: all 0.3s;
        }
        .nav-item.active { color: var(--primary-blue); }
        .nav-item.active svg { transform: translateY(-5px); }
        .product-card { transition: transform 0.2s; }
        .product-card:active { transform: scale(0.96); }
        .animate-pop { animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes pop { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* Loading Spinner */
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid var(--primary-blue);
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="toastContainer" class="fixed top-5 left-1/2 -translate-x-1/2 z-[1000] flex flex-col gap-3 w-[90%] max-w-sm pointer-events-none"></div>

    <header class="glass-nav sticky top-0 z-[90] px-5 py-4">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="text-3xl logo-text italic">سوقنا</h1>
            <div class="flex items-center gap-3">
                <button onclick="switchTab('profile')" class="w-10 h-10 rounded-full bg-blue-100 flex items-center justify-center border-2 border-white shadow-sm overflow-hidden" id="headerAvatar">
                    <svg class="w-6 h-6 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" stroke-width="2"></path></svg>
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 pt-4 pb-20">
        
        <!-- Auth Overlay -->
        <div id="authOverlay" class="fixed inset-0 z-[200] flex items-center justify-center bg-blue-600 p-6 hidden">
            <div class="bg-white w-full max-w-md rounded-[3rem] p-8 shadow-2xl text-center animate-pop">
                <h1 class="text-5xl logo-text italic mb-2">سوقنا</h1>
                <p class="text-slate-400 mb-8 font-bold text-sm">تجارة السودان في مكان واحد</p>
                <div id="loginSection" class="space-y-4">
                    <input type="email" id="loginEmail" placeholder="البريد الإلكتروني" class="w-full bg-slate-100 rounded-2xl px-6 py-4 outline-none border-2 border-transparent focus:border-blue-500 text-right">
                    <input type="password" id="loginPass" placeholder="كلمة المرور" class="w-full bg-slate-100 rounded-2xl px-6 py-4 outline-none border-2 border-transparent focus:border-blue-500 text-right">
                    <button onclick="handleLogin()" class="w-full bg-blue-600 text-white font-black py-4 rounded-2xl shadow-xl active:scale-95">دخول</button>
                    <p class="text-sm pt-4">ليس لديك حساب؟ <button onclick="toggleAuth(true)" class="text-blue-600 font-bold">سجل الآن</button></p>
                </div>
                <div id="registerSection" class="hidden space-y-4">
                     <input type="text" id="regName" placeholder="الاسم الكامل" class="w-full bg-slate-100 rounded-2xl px-6 py-4 outline-none text-right">
                     <input type="email" id="regEmail" placeholder="البريد الإلكتروني" class="w-full bg-slate-100 rounded-2xl px-6 py-4 outline-none text-right">
                     <input type="password" id="regPass" placeholder="كلمة المرور" class="w-full bg-slate-100 rounded-2xl px-6 py-4 outline-none text-right">
                     <button onclick="handleSignUp()" class="w-full bg-emerald-500 text-white font-black py-4 rounded-2xl shadow-xl active:scale-95">إنشاء حساب</button>
                     <p class="text-sm pt-4">لديك حساب؟ <button onclick="toggleAuth(false)" class="text-blue-600 font-bold">سجل دخولك</button></p>
                </div>
            </div>
        </div>

        <!-- Home Tab -->
        <section id="tab-home" class="tab-content">
            <div class="mb-6 relative">
                <input type="text" oninput="searchProducts(this.value)" placeholder="ابحث عن سيارات، عقارات، هواتف..." class="w-full glass-card rounded-2xl py-4 pr-12 pl-6 shadow-sm outline-none text-sm focus:ring-2 ring-blue-500 transition-all">
                <svg class="w-5 h-5 absolute right-4 top-4 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" stroke-width="2.5"></path></svg>
            </div>
            <div id="productsGrid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4"></div>
        </section>

        <!-- Add Ad Tab -->
        <section id="tab-add" class="tab-content hidden max-w-xl mx-auto">
            <div class="glass-card rounded-[2.5rem] p-6 shadow-xl">
                <h2 class="text-2xl font-black mb-6 text-center text-blue-800">إعلان جديد</h2>
                <div class="space-y-4">
                    <label class="block border-4 border-dashed border-blue-100 rounded-[2rem] p-8 text-center bg-blue-50/50 cursor-pointer hover:bg-blue-100 transition-all">
                        <input type="file" id="pImgFile" multiple hidden onchange="previewImages(this)">
                        <div id="previewPlaceholder" class="flex flex-col items-center">
                            <div class="w-14 h-14 bg-blue-500 text-white rounded-full flex items-center justify-center mb-2 shadow-lg">
                                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 4v16m8-8H4" stroke-width="3"></path></svg>
                            </div>
                            <span class="font-bold text-blue-600">أضف صور المنتج</span>
                        </div>
                        <div id="previewGallery" class="grid grid-cols-4 gap-2 hidden"></div>
                    </label>
                    <input type="text" id="pTitle" placeholder="عنوان الإعلان" class="w-full bg-white border border-slate-200 rounded-2xl p-4 text-right">
                    <div class="grid grid-cols-2 gap-3">
                        <input type="number" id="pPrice" placeholder="السعر" class="w-full bg-white border border-slate-200 rounded-2xl p-4 text-right">
                        <input type="text" id="pLocation" placeholder="الموقع" class="w-full bg-white border border-slate-200 rounded-2xl p-4 text-right">
                    </div>
                    <input type="tel" id="pPhone" placeholder="رقم التواصل (واتساب)" class="w-full bg-white border border-slate-200 rounded-2xl p-4 text-right">
                    <textarea id="pDesc" placeholder="تفاصيل إضافية..." class="w-full bg-white border border-slate-200 rounded-2xl p-4 text-right h-24 resize-none"></textarea>
                    <button onclick="submitProduct()" id="pSubmit" class="w-full bg-blue-600 text-white py-5 rounded-2xl font-black text-lg shadow-xl active:scale-95 transition-all">نشر الآن</button>
                </div>
            </div>
        </section>

        <!-- Profile Tab -->
        <section id="tab-profile" class="tab-content hidden animate-pop">
            <div class="max-w-2xl mx-auto space-y-4">
                <!-- User Header Card -->
                <div class="glass-card rounded-[3rem] p-8 shadow-2xl relative overflow-hidden border-t-4 border-blue-500">
                    <div class="flex flex-col items-center relative z-10 text-center">
                        <div class="relative">
                            <div id="profileAvatarBig" class="w-32 h-32 rounded-[2.5rem] bg-white shadow-xl flex items-center justify-center text-5xl overflow-hidden border-4 border-white">👤</div>
                            <label for="avatarFile" class="absolute bottom-0 left-0 bg-blue-600 text-white p-2 rounded-xl shadow-lg cursor-pointer transform hover:scale-110 transition-all">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" stroke-width="2"></path></svg>
                            </label>
                            <input type="file" id="avatarFile" hidden accept="image/*" onchange="updateAvatar(this)">
                        </div>
                        <h2 id="profileName" class="text-2xl font-black mt-4 text-blue-900">جاري التحميل...</h2>
                        <p id="profileEmailDisplay" class="text-slate-400 font-bold mb-6 text-sm italic">...</p>
                        <div class="flex gap-8 w-full justify-center border-t border-slate-100 pt-6">
                            <div class="text-center">
                                <p class="text-xl font-black text-blue-600" id="adsCount">0</p>
                                <p class="text-xs text-slate-400 font-bold">إعلان</p>
                            </div>
                            <div class="text-center">
                                <p class="text-xl font-black text-blue-600">موثوق</p>
                                <p class="text-xs text-slate-400 font-bold">الحالة</p>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Profile Actions -->
                <div class="space-y-3">
                    <!-- Edit Profile Info -->
                    <div class="glass-card rounded-3xl p-6">
                        <h3 class="font-black text-blue-800 mb-4 flex items-center gap-2">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" stroke-width="2"></path></svg>
                            تعديل البيانات الأساسية
                        </h3>
                        <div class="space-y-4">
                            <div>
                                <label class="block text-xs font-bold text-slate-400 mb-1 mr-2">الاسم بالكامل</label>
                                <input type="text" id="editName" class="w-full bg-slate-50 border border-slate-100 rounded-xl px-4 py-3 text-right text-sm">
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-slate-400 mb-1 mr-2">رقم الجوال (تلقائي للإعلانات)</label>
                                <input type="tel" id="editPhone" class="w-full bg-slate-50 border border-slate-100 rounded-xl px-4 py-3 text-right text-sm">
                            </div>
                            <button onclick="updateProfileInfo()" id="btnUpdateInfo" class="w-full bg-blue-600 text-white font-bold py-3 rounded-xl shadow-lg active:scale-95 transition-all text-sm">حفظ التعديلات</button>
                        </div>
                    </div>

                    <!-- Change Password -->
                    <div class="glass-card rounded-3xl p-6">
                        <h3 class="font-black text-blue-800 mb-4 flex items-center gap-2">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" stroke-width="2"></path></svg>
                            تغيير كلمة المرور
                        </h3>
                        <div class="space-y-4">
                            <input type="password" id="newPass" placeholder="كلمة المرور الجديدة" class="w-full bg-slate-50 border border-slate-100 rounded-xl px-4 py-3 text-right text-sm">
                            <input type="password" id="confirmPass" placeholder="تأكيد كلمة المرور" class="w-full bg-slate-50 border border-slate-100 rounded-xl px-4 py-3 text-right text-sm">
                            <button onclick="updatePassword()" id="btnUpdatePass" class="w-full bg-slate-800 text-white font-bold py-3 rounded-xl shadow-lg active:scale-95 transition-all text-sm">تحديث كلمة المرور</button>
                        </div>
                    </div>

                    <!-- My Ads Section -->
                    <button onclick="toggleMyAds()" class="glass-card w-full flex items-center justify-between p-5 rounded-2xl hover:bg-blue-50 transition-all group">
                        <div class="flex items-center gap-4">
                            <div class="w-10 h-10 bg-blue-100 text-blue-600 rounded-xl flex items-center justify-center group-hover:bg-blue-600 group-hover:text-white transition-all">
                                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" stroke-width="2"></path></svg>
                            </div>
                            <span class="font-black text-slate-700">إعلاناتي المنشورة</span>
                        </div>
                        <svg class="w-5 h-5 text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7" stroke-width="2"></path></svg>
                    </button>
                    <div id="myAdsContainer" class="hidden animate-pop space-y-3"></div>

                    <button onclick="logout()" class="w-full flex items-center justify-center gap-2 p-5 rounded-2xl text-rose-500 font-black hover:bg-rose-50 transition-all">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" stroke-width="2"></path></svg>
                        تسجيل الخروج
                    </button>
                </div>
            </div>
        </section>
    </main>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <button onclick="switchTab('home')" id="btn-home" class="nav-item active">
            <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" stroke-width="2.5"></path></svg>
            <span>الرئيسية</span>
        </button>
        <button onclick="switchTab('add')" id="btn-add" class="nav-item">
            <div class="w-12 h-12 bg-blue-600 text-white rounded-2xl flex items-center justify-center shadow-lg shadow-blue-200 -mt-8 mb-1">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 4v16m8-8H4" stroke-width="3"></path></svg>
            </div>
            <span>نشر إعلان</span>
        </button>
        <button onclick="switchTab('profile')" id="btn-profile" class="nav-item">
            <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" stroke-width="2.5"></path></svg>
            <span>حسابي</span>
        </button>
    </nav>

    <!-- Product Modal -->
    <div id="productModal" class="fixed inset-0 z-[500] hidden bg-slate-900/80 backdrop-blur-md flex items-end sm:items-center justify-center">
        <div id="modalContent" class="bg-white w-full max-w-2xl rounded-t-[3rem] sm:rounded-[3rem] p-6 max-h-[90vh] overflow-y-auto animate-up"></div>
    </div>

    <script>
        const SUPABASE_URL = "https://qmvijdplqgvdyxlniydq.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_cmmk6LJ9O0cU8asQWorPzw_cqNwrEgA";
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let currentUser = null;
        let profileData = null;
        let allProducts = [];

        async function checkSession() {
            const { data: { session } } = await sb.auth.getSession();
            if (session) {
                currentUser = session.user;
                initApp();
            } else {
                document.getElementById('authOverlay').classList.remove('hidden');
            }
        }

        function initApp() {
            document.getElementById('authOverlay').classList.add('hidden');
            loadProducts();
            fetchProfile();
        }

        async function fetchProfile() {
            const { data, error } = await sb.from('profiles').select('*').eq('id', currentUser.id).single();
            if (data) {
                profileData = data;
                document.getElementById('profileName').innerText = data.full_name;
                document.getElementById('profileEmailDisplay').innerText = currentUser.email;
                document.getElementById('editName').value = data.full_name;
                document.getElementById('editPhone').value = data.phone || '';
                document.getElementById('pPhone').value = data.phone || ''; // Auto-fill in add ad
                
                if(data.avatar_url) {
                    const img = `<img src="${data.avatar_url}" class="w-full h-full object-cover">`;
                    document.getElementById('profileAvatarBig').innerHTML = img;
                    document.getElementById('headerAvatar').innerHTML = img;
                }
                updateMyAdsCount();
            }
        }

        // --- الميزات المطلوبة الجديدة ---

        async function updateProfileInfo() {
            const btn = document.getElementById('btnUpdateInfo');
            const newName = document.getElementById('editName').value;
            const newPhone = document.getElementById('editPhone').value;

            if(!newName) return showToast("الاسم لا يمكن أن يكون فارغاً", "error");

            btn.disabled = true;
            btn.innerHTML = '<div class="spinner mx-auto"></div>';

            const { error } = await sb.from('profiles').update({ 
                full_name: newName, 
                phone: newPhone 
            }).eq('id', currentUser.id);

            if(error) {
                showToast(error.message, "error");
            } else {
                showToast("تم تحديث البيانات بنجاح");
                fetchProfile();
            }
            btn.disabled = false;
            btn.innerText = "حفظ التعديلات";
        }

        async function updatePassword() {
            const btn = document.getElementById('btnUpdatePass');
            const pass = document.getElementById('newPass').value;
            const confirm = document.getElementById('confirmPass').value;

            if(pass.length < 6) return showToast("كلمة المرور قصيرة جداً", "error");
            if(pass !== confirm) return showToast("كلمات المرور غير متطابقة", "error");

            btn.disabled = true;
            btn.innerHTML = '<div class="spinner mx-auto"></div>';

            const { error } = await sb.auth.updateUser({ password: pass });

            if(error) {
                showToast(error.message, "error");
            } else {
                showToast("تم تغيير كلمة المرور بنجاح");
                document.getElementById('newPass').value = '';
                document.getElementById('confirmPass').value = '';
            }
            btn.disabled = false;
            btn.innerText = "تحديث كلمة المرور";
        }

        // --- وظائف التطبيق الأساسية ---

        async function handleLogin() {
            const e = document.getElementById('loginEmail').value;
            const p = document.getElementById('loginPass').value;
            const { error } = await sb.auth.signInWithPassword({ email: e, password: p });
            if (error) showToast(error.message, 'error');
            else location.reload();
        }

        async function handleSignUp() {
            const n = document.getElementById('regName').value;
            const e = document.getElementById('regEmail').value;
            const p = document.getElementById('regPass').value;
            const { data, error } = await sb.auth.signUp({ email: e, password: p });
            if (error) showToast(error.message, 'error');
            else {
                await sb.from('profiles').upsert({ id: data.user.id, full_name: n, email: e });
                showToast("تم إنشاء الحساب! سجل دخولك");
                toggleAuth(false);
            }
        }

        async function loadProducts() {
            const { data } = await sb.from('products').select('*, product_images(image_url), profiles(full_name, avatar_url)').order('created_at', {ascending: false});
            if (data) {
                allProducts = data;
                renderProducts(data);
            }
        }

        function renderProducts(list) {
            const grid = document.getElementById('productsGrid');
            grid.innerHTML = list.map(p => `
                <div onclick="openProductDetail(${p.id})" class="product-card glass-card rounded-[2rem] p-3 shadow-sm cursor-pointer flex flex-col h-full animate-pop">
                    <div class="aspect-square rounded-[1.5rem] overflow-hidden mb-3 bg-blue-50">
                        <img src="${p.product_images?.[0]?.image_url || 'https://via.placeholder.com/400?text=Sogana'}" class="w-full h-full object-cover">
                    </div>
                    <div class="px-1">
                        <h3 class="font-black text-slate-800 text-[13px] truncate mb-1">${p.title}</h3>
                        <p class="text-blue-600 font-black text-sm">${Number(p.price).toLocaleString()} ج.س</p>
                        <div class="mt-2 flex items-center justify-between text-[10px] text-slate-400">
                             <span class="bg-blue-50 text-blue-600 px-2 py-0.5 rounded-full font-bold truncate max-w-[70px]">📍 ${p.location}</span>
                             <div class="w-6 h-6 rounded-full overflow-hidden border border-white shrink-0">
                                ${p.profiles?.avatar_url ? `<img src="${p.profiles.avatar_url}" class="w-full h-full object-cover">` : '👤'}
                             </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById(`tab-${tab}`).classList.remove('hidden');
            const btn = document.getElementById(`btn-${tab}`);
            if(btn) btn.classList.add('active');
            if(tab === 'profile') loadMyAds();
        }

        let selectedFiles = [];
        function previewImages(input) {
            const gallery = document.getElementById('previewGallery');
            const placeholder = document.getElementById('previewPlaceholder');
            gallery.innerHTML = '';
            selectedFiles = Array.from(input.files).slice(0, 10);
            if(selectedFiles.length > 0) {
                gallery.classList.remove('hidden');
                placeholder.classList.add('hidden');
                selectedFiles.forEach(f => {
                    const reader = new FileReader();
                    reader.onload = e => {
                        gallery.innerHTML += `<div class="aspect-square rounded-xl overflow-hidden border-2 border-blue-100"><img src="${e.target.result}" class="w-full h-full object-cover"></div>`;
                    };
                    reader.readAsDataURL(f);
                });
            }
        }

        async function submitProduct() {
            const btn = document.getElementById('pSubmit');
            const title = document.getElementById('pTitle').value;
            const price = document.getElementById('pPrice').value;
            const phone = document.getElementById('pPhone').value;

            if(!title || !price || selectedFiles.length === 0) return showToast("أكمل البيانات والصور", "error");

            btn.disabled = true;
            btn.innerHTML = '<div class="spinner mx-auto"></div>';

            const { data: product, error } = await sb.from('products').insert([{
                user_id: currentUser.id,
                title, price, location: document.getElementById('pLocation').value,
                whatsapp_number: phone, description: document.getElementById('pDesc').value
            }]).select().single();

            if(!error) {
                for(let f of selectedFiles) {
                    const b64 = await fileToBase64(f);
                    await sb.from('product_images').insert([{ product_id: product.id, image_url: b64 }]);
                }
                showToast("تم نشر إعلانك بنجاح!");
                setTimeout(() => location.reload(), 1500);
            } else {
                showToast(error.message, "error");
                btn.disabled = false;
                btn.innerText = "نشر الآن";
            }
        }

        async function deleteAd(id) {
            if(!confirm("حذف الإعلان؟")) return;
            await sb.from('product_images').delete().eq('product_id', id);
            await sb.from('products').delete().eq('id', id);
            showToast("تم الحذف");
            loadMyAds();
            loadProducts();
            updateMyAdsCount();
        }

        async function loadMyAds() {
            const { data } = await sb.from('products').select('*, product_images(image_url)').eq('user_id', currentUser.id);
            const container = document.getElementById('myAdsContainer');
            if(data?.length > 0) {
                container.innerHTML = data.map(p => `
                    <div class="glass-card p-4 rounded-2xl flex items-center justify-between gap-4 border-blue-50">
                        <div class="flex items-center gap-3">
                            <img src="${p.product_images?.[0]?.image_url}" class="w-12 h-12 rounded-lg object-cover">
                            <span class="font-bold text-sm truncate w-32">${p.title}</span>
                        </div>
                        <button onclick="deleteAd(${p.id})" class="text-rose-500 font-bold text-xs bg-rose-50 px-4 py-2 rounded-xl">حذف</button>
                    </div>
                `).join('');
            } else {
                container.innerHTML = `<p class="text-center text-slate-300 py-4 font-bold">لا يوجد إعلانات حالياً</p>`;
            }
        }

        function toggleMyAds() { document.getElementById('myAdsContainer').classList.toggle('hidden'); }

        function openProductDetail(id) {
            const p = allProducts.find(x => x.id === id);
            const imgs = p.product_images || [];
            document.getElementById('modalContent').innerHTML = `
                <div class="space-y-4">
                    <div class="flex justify-between items-center">
                         <button onclick="closeModal()" class="w-10 h-10 bg-slate-100 rounded-full flex items-center justify-center font-bold">✕</button>
                         <span class="font-black text-blue-600">تفاصيل المنتج</span>
                    </div>
                    <div class="rounded-[2rem] overflow-hidden bg-slate-50 aspect-video">
                        <img id="mainModalImg" src="${imgs[0]?.image_url}" class="w-full h-full object-contain">
                    </div>
                    <div class="flex gap-2 overflow-x-auto no-scrollbar py-2">
                        ${imgs.map(i => `<img src="${i.image_url}" onclick="document.getElementById('mainModalImg').src='${i.image_url}'" class="w-16 h-16 rounded-xl object-cover border-2 border-transparent hover:border-blue-500 cursor-pointer">`).join('')}
                    </div>
                    <h2 class="text-2xl font-black text-blue-900">${p.title}</h2>
                    <p class="text-blue-600 font-black text-xl">${Number(p.price).toLocaleString()} ج.س</p>
                    <div class="bg-blue-50 p-4 rounded-2xl text-slate-600 text-sm leading-relaxed">${p.description || 'لا يوجد وصف'}</div>
                    <div class="grid grid-cols-2 gap-3 pt-4">
                        <a href="tel:${p.whatsapp_number}" class="bg-blue-900 text-white py-4 rounded-2xl font-black text-center shadow-lg">اتصال</a>
                        <a href="https://wa.me/${p.whatsapp_number}" class="bg-emerald-500 text-white py-4 rounded-2xl font-black text-center shadow-lg">واتساب</a>
                    </div>
                </div>
            `;
            document.getElementById('productModal').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('productModal').classList.add('hidden'); }

        function fileToBase64(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result);
            });
        }

        function showToast(msg, type = 'success') {
            const container = document.getElementById('toastContainer');
            const t = document.createElement('div');
            t.className = `${type === 'success' ? 'bg-emerald-500' : 'bg-rose-500'} text-white px-6 py-4 rounded-2xl shadow-xl font-bold animate-pop flex items-center gap-2`;
            t.innerHTML = `<span>${type === 'success' ? '✓' : '⚠'}</span> ${msg}`;
            container.appendChild(t);
            setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 500); }, 3000);
        }

        function searchProducts(q) {
            const filtered = allProducts.filter(p => p.title.toLowerCase().includes(q.toLowerCase()) || p.location.toLowerCase().includes(q.toLowerCase()));
            renderProducts(filtered);
        }

        async function logout() { await sb.auth.signOut(); location.reload(); }

        async function updateAvatar(input) {
            if(!input.files[0]) return;
            const b64 = await fileToBase64(input.files[0]);
            await sb.from('profiles').update({ avatar_url: b64 }).eq('id', currentUser.id);
            showToast("تم تحديث الصورة");
            fetchProfile();
        }

        async function updateMyAdsCount() {
            const { count } = await sb.from('products').select('*', { count: 'exact', head: true }).eq('user_id', currentUser.id);
            document.getElementById('adsCount').innerText = count || 0;
        }

        function toggleAuth(isReg) {
            document.getElementById('loginSection').classList.toggle('hidden', isReg);
            document.getElementById('registerSection').classList.toggle('hidden', !isReg);
        }

        window.onload = checkSession;
    </script>
</body>
</html>
